{% load current_time %}
{% load user_info %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    {% if request.user.is_authenticated %}
    <a href="{% url 'logout' %}" onclick="event.preventDefault(); document.getElementById('logout-form').submit()">Logout</a>

    <form id="logout-form" method="post" action="{% url 'logout' %}" style="display: none;">
    {% csrf_token %}
    </form>
    {% endif %}
<p>Last refresh {% current_time '%Y-%m-%d %H:%M:%S' %}</p>
    {% block content %}
    {% endblock %}
    {% user_info %}
</body>
</html>
