<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    {% if text %}
        <h2>{{ text }}</h2>
    {% else %}
        <p>No text</p>
    {% endif %}
    <h1>Current time is : {{ current_time }}</h1>
    <p>Age: {{ person.age }}, Height: {{ person.height }}</p>
    <p>ID number 1: {{ ids.0 }}</p>
    <p>Text: {{ text|truncatechars:15 }}</p>
</body>
</html>
